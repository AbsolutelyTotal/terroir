<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Card — terroir</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background:
      radial-gradient(circle at 88% 30%, rgba(212,80,78,0.18), transparent 45%),
      radial-gradient(circle at 12% 80%, rgba(122,39,51,0.22), transparent 50%),
      linear-gradient(135deg, #1e2128 0%, #16181f 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    padding: 52px 80px;
    position: relative;
  }
  .pin {
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.08), 0 6px 24px rgba(0,0,0,0.4);
  }
  .pin-1 { width: 18px; height: 18px; background: #2563eb; top: 120px; right: 180px; }
  .pin-2 { width: 22px; height: 22px; background: #ea580c; top: 220px; right: 250px; }
  .pin-3 { width: 18px; height: 18px; background: #dc2626; top: 320px; right: 150px; }
  .pin-4 { width: 16px; height: 16px; background: #ea580c; top: 410px; right: 290px; }
  .pin-5 { width: 14px; height: 14px; background: #2563eb; top: 180px; right: 340px; }
  .grape { font-size: 64px; line-height: 1; }
  .label {
    font-size: 14px;
    font-weight: 700;
    color: #d4504e;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 24px;
  }
  h1 {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 60px;
    font-weight: 500;
    line-height: 1.05;
    margin-top: 10px;
    letter-spacing: -0.8px;
  }
  .tagline {
    font-size: 22px;
    color: rgba(255,255,255,0.72);
    margin-top: 18px;
    line-height: 1.4;
    max-width: 820px;
  }
  .footer {
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 22px;
  }
  .url {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .cta {
    background: linear-gradient(180deg, #b53a4a 0%, #8a2832 100%);
    color: #fff;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.4px;
    box-shadow: 0 4px 16px rgba(180,58,74,0.4);
  }
</style>
</head>
<body>
  <div class="pin pin-1"></div>
  <div class="pin pin-2"></div>
  <div class="pin pin-3"></div>
  <div class="pin pin-4"></div>
  <div class="pin pin-5"></div>

  <div>
    <span class="grape">🍇</span>
    <div class="label">WSET Level 2 · Wine Study</div>
    <h1>Interactive Grape &amp;<br>Region Study Map</h1>
    <p class="tagline">Pick a grape to highlight its regions across the world.<br>Pick a region to see what grows there.</p>
  </div>

  <div class="footer">
    <div class="url">terroir.cc</div>
    <div class="cta">Try it now →</div>
  </div>
</body>
</html>
